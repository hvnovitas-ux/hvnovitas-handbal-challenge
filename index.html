```html
<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧡 HV Novitas Handbal Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrap">

    <!-- STARTSCHERM -->

    <div id="startScreen" class="center">

        <h1>🧡 HV NOVITAS</h1>

        <h2>HANDBAL CHALLENGE</h2>

        <p>
            Test jouw handbalkennis met 30 uitdagende vragen.
        </p>

        <p>
            🏆 Beginner • Gemiddeld • Expert
        </p>

        <h3>🧡 No Stress, Enjoy!</h3>

        <button id="startButton">
            ▶ Start de Quiz
        </button>

        <br><br>

        <button id="showLeaderboard">
            🏆 Maandranglijst
        </button>

    </div>

    <!-- QUIZSCHERM -->

    <div id="game" style="display:none;">

        <div class="topbar">

            <div id="status">
                🏆 Score: 0
            </div>

            <div id="vraagnummer">
                Vraag 1 / 30
            </div>

        </div>

        <div class="bar">
            <div id="fill"></div>
        </div>

        <div id="quiz"></div>

        <br>

        <button id="next">
            Volgende →
        </button>

    </div>

    <!-- EINDSCHERM -->

    <div id="finishScreen" style="display:none;">

        <h1>🏆 Gefeliciteerd!</h1>

        <div id="result"></div>

        <br>

        <label for="playerName">
            Jouw naam
        </label>

        <input
            type="text"
            id="playerName"
            placeholder="Vul je naam in">

        <br><br>

        <button id="saveScore">
            💾 Score opslaan
        </button>

        <br><br>

        <button id="showLeaderboard2">
            🏆 Bekijk maandranglijst
        </button>

    </div>

    <!-- MAANDRANGLIJST -->

    <div id="leaderboard" style="display:none;">

        <h1>🏆 Maandranglijst</h1>

        <h2 id="currentMonth">
            Juli 2026
        </h2>

        <div id="leaderboardList">

            <p>Nog geen scores.</p>

        </div>

        <br>

        <button id="backHome">
            ⬅ Terug
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
```

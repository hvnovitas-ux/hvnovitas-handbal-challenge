<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧡 HV Novitas Handbal Challenge</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="wrap">

    <div id="startScreen" class="center">

        <h1>🧡 HV NOVITAS</h1>

        <h2>HANDBAL CHALLENGE</h2>

        <p style="font-size:22px;">

            Test jouw handbalkennis!

        </p>

        <br>

        <p>

            🏆 15 uitdagende vragen<br>
            🤾 Voor jong en oud<br>
            ⭐ Verdien jouw medaille<br><br>

            <b>No Stress, Enjoy!</b>

        </p>

        <br>

        <button id="startButton">

            ▶ START DE QUIZ

        </button>

    </div>

    <div id="game" style="display:none;">

        <h2 id="status">

            🏆 Score: 0

        </h2>

        <div class="bar">

            <div id="fill"></div>

        </div>

        <div id="quiz"></div>

        <br>

        <button id="next">

            Volgende →

        </button>

        <div id="result"></div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧡 HV Novitas Handbal Challenge</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="wrap">

    <!-- STARTSCHERM -->
    <div id="startScreen" class="center">

        <h1>🧡 HV NOVITAS</h1>

        <h2>HANDBAL CHALLENGE</h2>

        <p>Test jouw handbalkennis!</p>

        <p>
            🏆 30 vragen<br>
            ⭐ Beginner • Gemiddeld • Expert
        </p>

        <h3>🧡 No Stress, Enjoy!</h3>

        <button id="startButton">
            ▶ START DE QUIZ
        </button>

        <br><br>

        <button id="showLeaderboard">
            🏆 Maandranglijst
        </button>

    </div>

    <!-- QUIZ -->
    <div id="game" style="display:none;">

        <div class="topbar">

            <div id="status">
                🏆 Score: 0
            </div>

            <div id="vraagnummer">
                Vraag 1 / 30
            </div>

        </div>

        <div class="bar">
            <div id="fill"></div>
        </div>

        <div id="quiz"></div>

        <br>

        <button id="next">
            Volgende →
        </button>

    </div>

    <!-- EINDSCHERM -->
    <div id="finishScreen" style="display:none;">

        <div id="finalScore"></div>

        <br>

        <input
            type="text"
            id="playerName"
            placeholder="Jouw naam">

        <br><br>

        <button id="saveScore">
            💾 Score opslaan
        </button>

        <br><br>

        <button id="showLeaderboard2">
            🏆 Bekijk maandranglijst
        </button>

        <br><br>

        <button id="backHome">
            🏠 Terug naar start
        </button>

    </div>

    <!-- RANGLIJST -->
    <div id="leaderboard" style="display:none;">

        <h1>🏆 Maandranglijst</h1>

        <div id="leaderboardList">

            Nog geen scores.

        </div>

        <br>

        <button id="backHome2">
            🏠 Terug
        </button>

    </div>

</div>

<script src="questions.js"></script>

<script type="module" src="firebase.js"></script>

<script src="script.js"></script>

</body>
</html>
